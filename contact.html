<!doctype html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
      defer
    ></script>
    <link rel="stylesheet" href="./styles/globalStyles.css" />
    <link rel="stylesheet" href="./styles/styles.css" />
    <link rel="stylesheet" href="./styles/contact.css" />
    <script src="./js/index.js" defer></script>
    <title>Contact us</title>
  </head>
  <body>
    <header class="header-margin">
      <!-- make navbar fixed and light so it floats above the background on all viewports -->
      <nav
        class="navbar navbar-expand-lg navbar-light bg-adjust fixed-top nav-height"
      >
        <div class="container-fluid container-adjust">
          <a class="navbar-brand" href="#"
            ><img
              class="logo"
              src="images/logo.png"
              alt="Adventure Gear Co. Logo"
          /></a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link" aria-current="page" href="./index.html"
                  >Home</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./products.html">Products</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="./contact.html">Contact</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="d-flex align-items-center py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
            <div class="contact-card">
              <h2 class="mb-4 contact-title">Contact Us</h2>
              <form id="contactForm" novalidate>
                <div class="mb-3">
                  <label for="name" class="form-label contact-label"
                    >Name</label
                  >
                  <input
                    type="text"
                    class="form-control contact-input"
                    id="name"
                    placeholder="Enter your name"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="email" class="form-label contact-label"
                    >Email</label
                  >
                  <input
                    type="email"
                    class="form-control contact-input"
                    id="email"
                    placeholder="Enter your email"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="phone" class="form-label contact-label"
                    >Phone</label
                  >
                  <input
                    type="tel"
                    class="form-control contact-input"
                    id="phone"
                    placeholder="Enter your phone number"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="queryType" class="form-label contact-label"
                    >Query Type</label
                  >
                  <select
                    class="form-select contact-input"
                    id="queryType"
                    required
                  >
                    <option value="" disabled selected>Select a topic</option>
                    <option value="booking">Booking</option>
                    <option value="payment">Payment</option>
                    <option value="general">General Info</option>
                    <option value="other">Other</option>
                  </select>
                </div>
                <div class="mb-4">
                  <label for="message" class="form-label contact-label"
                    >Message</label
                  >
                  <textarea
                    class="form-control contact-input"
                    id="message"
                    rows="4"
                    placeholder="Type your message (min. 20 characters)"
                    required
                  ></textarea>
                </div>
                <button
                  type="submit"
                  onclick="handleSubmit(event)"
                  class="btn-adventure-primary w-100"
                >
                  Submit
                </button>
              </form>

              <div
                id="successMsg"
                class="contact-feedback contact-feedback--success d-none"
              >
                <span>&#10003;</span> Your form has been sent successfully!
              </div>
              <div
                id="errorMsg"
                class="contact-feedback contact-feedback--error d-none"
              >
                <span>&#10007;</span> Please fill in the required fields
                properly!
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
